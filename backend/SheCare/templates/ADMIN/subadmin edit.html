{% include 'ADMIN/home.html' %}

<main class="dashboard-container">

    <!-- Page Header -->
    <div class="dashboard-header">
        <h1><i class="fas fa-user-cog me-2"></i>Edit Sub-Admin</h1>
        <p>Update the sub-admin details and save changes</p>
    </div>

    <!-- Form Card -->
    <div class="quick-actions p-4" style="border-radius: 20px;">
        <h2 class="section-title"><i class="fas fa-user-shield"></i> Sub-Admin Information</h2>

        <form id="editSubAdminForm" method="post" enctype="multipart/form-data" action="/myapp/edit_subadmin_post/" class="row g-4 needs-validation" novalidate>
            {% csrf_token %}
            <input type="hidden" name="id" value="{{ data.LOGIN_id }}">

            <!-- Profile Photo -->
            <div class="col-md-4 text-center">
                <div class="profile-photo-wrapper mb-3">
                    <img src="{{ data.photo }}" alt="photo" id="previewImg" class="img-fluid rounded">
                </div>

                <div class="input-group">
                    <input type="file" name="fileField" id="fileField" class="form-control" accept="image/*" onchange="previewImage(event)">
                </div>
                <small class="text-muted">Upload new photo (max 2MB)</small>
            </div>

            <!-- Basic Information -->
            <div class="col-md-8">
                <div class="row g-3">

                    <!-- Name -->
                    <div class="col-12">
                        <label class="form-label fw-semibold">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="textfield" value="{{ data.name }}" class="form-control" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" name="textfield2" value="{{ data.email }}" class="form-control" required>
                        </div>
                    </div>

                    <!-- Phone -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Phone</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                            <input type="tel" name="textfield3" value="{{ data.phone }}" class="form-control" pattern="[0-9]{10}" required>
                        </div>
                    </div>

                    <!-- Gender -->
                    <div class="col-md-12">
                        <label class="form-label fw-semibold d-block">Gender</label>
                        <div class="d-flex gap-4 flex-wrap">

                            <label class="btn btn-outline-primary rounded-pill px-4">
                                <input type="radio" name="RadioGroup1" value="male" class="d-none" {% if data.gender == 'male' %}checked{% endif %}>
                                <i class="fas fa-male me-2"></i>Male
                            </label>

                            <label class="btn btn-outline-primary rounded-pill px-4">
                                <input type="radio" name="RadioGroup1" value="female" class="d-none" {% if data.gender == 'female' %}checked{% endif %}>
                                <i class="fas fa-female me-2"></i>Female
                            </label>

                            <label class="btn btn-outline-primary rounded-pill px-4">
                                <input type="radio" name="RadioGroup1" value="others" class="d-none" {% if data.gender == 'others' %}checked{% endif %}>
                                <i class="fas fa-user me-2"></i>Others
                            </label>

                        </div>
                    </div>

                </div>
            </div>

            <!-- Form Actions -->
            <div class="col-12 d-flex justify-content-between align-items-center pt-4 border-top">
                <span class="text-muted small">Sub-Admin ID: #{{ data.id }}</span>

                <div class="d-flex gap-3">
                    <button type="button" onclick="window.history.back()" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-2"></i>Cancel
                    </button>

                    <button type="submit" class="btn btn-primary px-4">
                        <i class="fas fa-save me-2"></i>Update Sub-Admin
                    </button>
                </div>
            </div>

        </form>
    </div>
</main>

{% include 'ADMIN/footer.html' %}

<style>
    .profile-photo-wrapper img {
        width: 180px;
        height: 180px;
        border-radius: 12px;
        object-fit: cover;
        border: 2px solid var(--border-color);
        transition: 0.3s;
    }
    .profile-photo-wrapper img:hover {
        transform: scale(1.03);
        border-color: var(--primary-color);
    }
    .input-group-text {
        background-color: rgba(var(--primary-rgb), 0.08);
    }
    .btn-outline-primary {
        border-color: var(--border-color) !important;
    }
    .btn-outline-primary:hover,
    .btn-outline-primary input:checked + label {
        border-color: var(--primary-color) !important;
    }
</style>

<script>
    function previewImage(event){
        const img = document.getElementById('previewImg');
        img.src = URL.createObjectURL(event.target.files[0]);
    }
</script>
