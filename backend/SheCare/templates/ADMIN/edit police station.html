{% include 'ADMIN/home.html' %}

<main class="dashboard-container">

    <!-- Page Header -->
    <div class="dashboard-header">
        <h1><i class="fas fa-building me-2"></i>Edit Police Station</h1>
        <p>Update the station details and save changes</p>
    </div>

    <!-- Form Card -->
    <div class="quick-actions p-4" style="border-radius: 20px;">
        <h2 class="section-title"><i class="fas fa-shield-alt"></i> Station Information</h2>

        <form id="editStationForm" method="post" action="/myapp/edit_policestation_post/" class="row g-4 needs-validation" novalidate>
            {% csrf_token %}
            <input type="hidden" name="id" value="{{ data.id }}">

            <!-- Station Name -->
            <div class="col-12">
                <label class="form-label fw-semibold">Station Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-id-badge"></i></span>
                    <input type="text" name="textfield" value="{{ data.name }}" class="form-control" required>
                </div>
            </div>

            <!-- Place -->
            <div class="col-md-6">
                <label class="form-label fw-semibold">Place</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-map-marker-alt"></i></span>
                    <input type="text" name="textfield2" value="{{ data.place }}" class="form-control" required>
                </div>
            </div>

            <!-- Post -->
            <div class="col-md-6">
                <label class="form-label fw-semibold">Post</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="text" name="textfield3" value="{{ data.post }}" class="form-control" required>
                </div>
            </div>

            <!-- Since Year -->
            <div class="col-md-6">
                <label class="form-label fw-semibold">Since Year</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-history"></i></span>
                    <input type="number" name="textfield6" value="{{ data.since }}" class="form-control" min="1800" max="2024" required>
                </div>
            </div>

            <!-- District -->
            <div class="col-md-6">
                <label class="form-label fw-semibold">District</label>
                <select name="select" class="form-select form-select-lg" required>
                    <option value="Kasargod" {% if data.district == "Kasargod" %}selected{% endif %}>Kasargod</option>
                    <option value="Kannur" {% if data.district == "Kannur" %}selected{% endif %}>Kannur</option>
                    <option value="Kozhikode" {% if data.district == "Kozhikode" %}selected{% endif %}>Kozhikode</option>
                    <option value="Thrissur" {% if data.district == "Thrissur" %}selected{% endif %}>Thrissur</option>
                    <option value="Eranakulam" {% if data.district == "Eranakulam" %}selected{% endif %}>Eranakulam</option>
                    <option value="Palakkad" {% if data.district == "Palakkad" %}selected{% endif %}>Palakkad</option>
                    <option value="Thiruvananthapuram" {% if data.district == "Thiruvananthapuram" %}selected{% endif %}>Thiruvananthapuram</option>
                </select>
            </div>

            <!-- State -->
            <div class="col-md-6">
                <label class="form-label fw-semibold">State</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-flag"></i></span>
                    <input type="text" name="textfield5" value="{{ data.state }}" class="form-control" required>
                </div>
            </div>

            <!-- Phone -->
            <div class="col-md-6">
                <label class="form-label fw-semibold">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                    <input type="tel" name="textfield7" value="{{ data.phone }}" class="form-control" pattern="[0-9]{10}" required>
                </div>
            </div>

            <!-- Email -->
            <div class="col-md-6">
                <label class="form-label fw-semibold">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" name="textfield8" value="{{ data.email }}" class="form-control" required>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="col-12 d-flex justify-content-between align-items-center pt-4 border-top">
                <span class="text-muted small">Station ID: #{{ data.id }}</span>

                <div class="d-flex gap-3">
                    <a href="/myapp/view_police_station/" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-2"></i>Back
                    </a>
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="fas fa-save me-2"></i>Update Station
                    </button>
                </div>
            </div>

        </form>
    </div>

</main>

{% include 'ADMIN/footer.html' %}
